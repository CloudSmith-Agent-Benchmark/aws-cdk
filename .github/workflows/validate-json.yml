name: Validate JSON Files

on:
  push:
    branches:
      - '**'
  pull_request:
    branches: [ jsonLintError ]

jobs:
  validate-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Run JSON validation
        run: |
          chmod +x ./check_json.sh
          ./check_json.sh